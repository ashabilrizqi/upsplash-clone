<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - UpSplash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-white text-neutral-900 font-sans antialiased min-h-screen flex">

  <main class="w-full lg:w-[55%] min-h-screen flex flex-col justify-between p-5 sm:p-8 md:p-12 bg-white">

    <div class="flex items-center justify-between w-full mb-6 md:mb-8">
      <a href="index.html" class="text-neutral-900 text-2xl hover:text-neutral-600 transition">
        <i class="fa-solid fa-square-minus text-2xl rotate-180"></i>
      </a>
      <span class="text-xs font-medium text-neutral-500">
        Already have an account? <a href="index.html"
          class="text-neutral-900 underline hover:text-neutral-600">Login</a>
      </span>
    </div>

    <div class="w-full max-w-md mx-auto my-auto space-y-5 md:space-y-6">
      <div class="text-center space-y-2">
        <h1 class="text-3xl md:text-4xl font-black text-neutral-900 tracking-tight">Join UpSplash</h1>
      </div>

      <form id="register-form" class="space-y-4 pt-2 md:pt-4">

        <div class="flex flex-col sm:flex-row gap-4 w-full">
          <div class="flex-1 space-y-1.5">
            <label class="text-xs font-medium text-neutral-700">First name</label>
            <input type="text" required
              class="w-full px-3 py-2 text-sm border border-neutral-300 rounded focus:outline-none focus:border-neutral-900 transition bg-white">
          </div>
          <div class="flex-1 space-y-1.5">
            <label class="text-xs font-medium text-neutral-700">Last name</label>
            <input type="text" required
              class="w-full px-3 py-2 text-sm border border-neutral-300 rounded focus:outline-none focus:border-neutral-900 transition bg-white">
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-neutral-700">Email</label>
          <input type="email" required
            class="w-full px-3 py-2 text-sm border border-neutral-300 rounded focus:outline-none focus:border-neutral-900 transition bg-white">
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-neutral-700">
            Username <span class="text-neutral-400 font-normal block sm:inline">(only letters, numbers and
              underscores)</span>
          </label>
          <input type="text" required
            class="w-full px-3 py-2 text-sm border border-neutral-300 rounded focus:outline-none focus:border-neutral-900 transition bg-white">
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-neutral-700">
            Password <span class="text-neutral-400 font-normal">(min. 8 char)</span>
          </label>
          <input type="password" required minlength="8"
            class="w-full px-3 py-2 text-sm border border-neutral-300 rounded focus:outline-none focus:border-neutral-900 transition bg-white">
        </div>

        <button type="submit"
          class="w-full bg-neutral-900 hover:bg-neutral-800 text-white text-sm font-semibold py-2.5 rounded shadow-sm transition mt-2 cursor-pointer">
          Join
        </button>
      </form>
    </div>

    <div class="w-full text-center text-[11px] text-neutral-400 pt-6 md:pt-8">
      By joining, you agree to the <a href="#" class="underline hover:text-neutral-600">Terms</a> and <a href="#"
        class="underline hover:text-neutral-600">Privacy Policy</a>.
    </div>
  </main>

  <section class="hidden lg:block lg:w-[45%] h-screen sticky top-0 bg-neutral-200">
    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1000&q=80"
      alt="Mountain View" class="w-full h-full object-cover">
  </section>

  <script>
    const registerForm = document.getElementById('register-form');

    registerForm.addEventListener('submit', (e) => {
      // Menghentikan aksi refresh halaman bawaan browser
      e.preventDefault();

      // Menyimpan token login tiruan ke dalam localStorage browser
      localStorage.setItem('isLoggedIn', 'true');

      // Mengalihkan secara instan ke halaman utama tanpa alert pop-up
      window.location.href = 'index.html';
    });
  </script>

</body>

</html>
